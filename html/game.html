<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математический Биатлон — Игра</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/game.css">
</head>
<body>

    <div id="game-screen" class="screen active">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <!-- Панель информации (HUD) -->
        <div class="game-hud">
            <div class="hud-item">🎯 Счёт: <span id="score">0</span></div>
            <div class="hud-item">⏱️ Время: <span id="timer">00:00</span></div>
            <div class="hud-item">🏁 Рубеж: <span id="lap">1</span>/<span id="totalLaps">5</span></div>
            <div class="hud-item status" id="status">🏃‍♂️ БЕГ</div>
        </div>

        <!-- Кнопка выхода (закрыть окно) -->
        <button id="game-exit" class="game-exit-btn">✖</button>
    </div>

    <!-- Модальное окно РЕЗУЛЬТАТОВ -->
    <div id="result-modal" class="result-modal-overlay hidden">
        <div class="result-modal-content">
            <h2 class="result-title" id="result-title">🏆 ПОБЕДА!</h2>
            <div class="result-grade" id="result-grade">Отлично</div>
            <div class="result-stats">
                <div class="stat-row"><span>🎯 Счёт:</span> <span id="result-score">0</span></div>
                <div class="stat-row"><span>✅ Правильных:</span> <span id="result-correct">0</span></div>
                <div class="stat-row"><span>❌ Ошибок:</span> <span id="result-wrong">0</span></div>
                <div class="stat-row"><span>📊 Точность:</span> <span id="result-accuracy">0%</span></div>
                <div class="stat-row"><span>⏱️ Время:</span> <span id="result-time">00:00</span></div>
            </div>
            <div class="result-buttons">
                <button id="result-restart" class="result-btn restart-btn">🔄 Играть снова</button>
                <button id="result-menu" class="result-btn menu-btn">🏠 В меню</button>
            </div>
        </div>
    </div>

    <!-- Подключаем модули игры -->
    <script src="/js/config.js"></script>
    <script src="/js/audio.js"></script>
    <script src="/js/problems.js"></script>
    <script src="/js/gameState.js"></script>
    <script src="/js/render.js"></script>
    <script src="/js/input.js"></script>
    <script src="/js/gameLoop.js"></script>
    <script src="/js/gameMain.js"></script>   <!-- переименованный игровой main -->
</body>
</html>
