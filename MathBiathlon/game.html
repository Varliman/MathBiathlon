<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математический Биатлон — Игра</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="game-screen" class="screen active">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <!-- Панель информации (HUD) -->
        <div class="game-hud">
            <div class="hud-item">🎯 Счёт: <span id="score">0</span></div>
            <div class="hud-item">⏱️ Время: <span id="timer">00:00</span></div>
            <div class="hud-item">🏁 Рубеж: <span id="lap">1</span>/<span id="totalLaps">5</span></div>
            <div class="hud-item status" id="status">🏃‍♂️ БЕГ</div>
        </div>

        <!-- Кнопка выхода (закрыть окно) -->
        <button id="game-exit" class="game-exit-btn">✖</button>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
